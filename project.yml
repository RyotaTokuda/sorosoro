name: Sorosoro
options:
  bundleIdPrefix: com.mankai.sorosoro
  deploymentTarget:
    iOS: "17.0"
    watchOS: "10.0"
  xcodeVersion: "26.0"
  generateEmptyDirectories: true
settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: "R7B3AEZ7TA"
targets:
  Sorosoro:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Sorosoro
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mankai.sorosoro
        INFOPLIST_FILE: Sorosoro/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_ENTITLEMENTS: Sorosoro/Sorosoro.entitlements
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
        SWIFT_VERSION: "5.9"
    resources:
      - path: Sorosoro/Resources
    entitlements:
      path: Sorosoro/Sorosoro.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.mankai.sorosoro
        com.apple.developer.icloud-services:
          - CloudKit
        com.apple.developer.icloud-container-identifiers:
          - iCloud.com.mankai.sorosoro
  SorosoroWatch:
    type: application
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - path: SorosoroWatch
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mankai.sorosoro.watch
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_WKCompanionAppBundleIdentifier: com.mankai.sorosoro
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_ENTITLEMENTS: SorosoroWatch/SorosoroWatch.entitlements
    resources:
      - path: SorosoroWatch/Resources
    entitlements:
      path: SorosoroWatch/SorosoroWatch.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.mankai.sorosoro
  SorosoroTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: SorosoroTests
      - path: Shared
    dependencies:
      - target: Sorosoro

schemes:
  Sorosoro:
    build:
      targets:
        Sorosoro: all
    run:
      config: Debug
      storeKitConfiguration: Sorosoro/Resources/Sorosoro.storekit
    test:
      config: Debug
      targets:
        - SorosoroTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
